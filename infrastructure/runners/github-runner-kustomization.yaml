apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: github-runners
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: github-runners
  path: ./helm
  prune: true
  wait: true
  timeout: 3m
  dependsOn:
    - name: namespaces
  targetNamespace: github-runners
