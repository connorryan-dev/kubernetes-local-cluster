# Binds the API server to the Mac mini's Tailscale IP (100.84.198.108) instead of kind's
# default 127.0.0.1-only binding, so kubectl/k9s work from other machines on the tailnet
# without an SSH tunnel or port-forward. See docs/remote-access.md for why this exists.
#
# Always pass --config kind-config.yaml when creating/recreating this cluster:
#   kind create cluster --name=desktop --image kindest/node:v1.33.0 --config kind-config.yaml
# A bare `kind create cluster` silently regresses to loopback-only.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    apiServer:
      certSANs:
      - "100.84.198.108"
      - "localhost"
      - "127.0.0.1"
  extraPortMappings:
  - containerPort: 6443
    hostPort: 6443
    listenAddress: "0.0.0.0"
    protocol: TCP
# extraMounts bind the Mac mini's NAS share (SMB-mounted at /Users/connor/NAS) into both
# worker nodes, so workload PVs can use a real hostPath instead of node-local ephemeral
# storage. Bound on both workers since pod/PV placement isn't pinned to a specific node.
# Must be present in Docker Desktop's Settings -> Resources -> File Sharing for the mount
# to succeed. See bento-kubernetes-deployments/docs/postgres.md.
- role: worker
  extraMounts:
  - hostPath: /Users/connor/NAS
    containerPath: /Users/connor/NAS
- role: worker
  extraMounts:
  - hostPath: /Users/connor/NAS
    containerPath: /Users/connor/NAS
